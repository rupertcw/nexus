services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - ./qdrant_data:/qdrant/storage

  postgres:
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - ./pg_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always

  embedding-service:
    build:
      context: ./embedding_service
    restart: always
    env_file:
      - .env

  backend:
    build:
      context: ./backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant
      - postgres
      - redis
      - embedding-service
    volumes:
      - ./data:/app/data

  worker:
    build:
      context: ./backend
    restart: always
    command: rq worker -u redis://redis:6379/0 high default low
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - qdrant
      - embedding-service
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    # NO volumes mapped in production
    command: npm run start

  prometheus:
    image: prom/prometheus
    restart: always

  grafana:
    image: grafana/grafana
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      - prometheus
