name: nexus
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - fastapi=0.111
  - uvicorn=0.30
  - sqlalchemy=2.0
  - psycopg2=2.9
  - pydantic=2.7
  - click
  - httpx=0.27
  - python-docx=1.1
  - qdrant-client=1.9
  - anthropic=0.28
  - pypdf=4.2
  - duckdb=1.5
  - pyjwt=2.12
  - pandas=2.2
  - pyarrow=16.1
  - groq=1.1
  - redis=3.5
  - rq=1.16
  - prometheus-fastapi-instrumentator=7.0
  - python-json-logger=2.0
  # Testing specific:
  - pytest=8.0
  - pytest-mock
  - fakeredis=1.7
  - playwright
  - pytest-playwright
