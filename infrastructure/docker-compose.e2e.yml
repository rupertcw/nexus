services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../data/qdrant_data:/qdrant/storage

  postgres:
    image: postgres:15
    env_file:
      - ../.env.e2e
    ports:
      - "5432:5432"
    volumes:
      - ../data/pg_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  embedding-service:
    build:
      context: ../apps/embedding_service
    ports:
      - "8001:8001"
    env_file:
      - ../.env.e2e
    volumes:
      - ../apps/embedding_service:/app

  backend:
    build:
      context: ../apps/backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env.e2e
    depends_on:
      - qdrant
      - postgres
      - redis
      - embedding-service
    volumes:
      - ../apps/backend:/app
      - ../data/test_docs:/documents
      - ../apps/backend/tests/assets:/app/tests/assets

  worker:
    build:
      context: ../apps/backend
    command: rq worker -u redis://redis:6379/0 high default low
    env_file:
      - ../.env.e2e
    depends_on:
      - redis
      - postgres
      - qdrant
      - embedding-service
    volumes:
      - ../apps/backend:/app
      - ../data/test_docs:/documents
      - ../apps/backend/tests/assets:/app/tests/assets

  frontend:
    build:
      context: ../apps/frontend
    ports:
      - "3000:3000"
    env_file:
      - ../.env.e2e
    depends_on:
      - backend
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
    command: npm run dev

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    env_file:
      - ../.env.e2e
    depends_on:
      - prometheus