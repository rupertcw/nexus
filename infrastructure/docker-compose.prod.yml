services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      # Persistent vector data moved to top-level data folder
      - ../data/qdrant_data:/qdrant/storage

  postgres:
    image: postgres:15
    restart: always
    env_file:
      - ../.env
    volumes:
      # Persistent SQL data moved to top-level data folder
      - ../data/pg_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always

  embedding-service:
    build:
      context: ../apps/embedding_service
    restart: always
    env_file:
      - ../.env

  backend:
    build:
      context: ../apps/backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - qdrant
      - postgres
      - redis
      - embedding-service
    volumes:
      # Shared data folder (e.g. for temporary file processing)
      - ../data/test_docs:/app/data

  worker:
    build:
      context: ../apps/backend
    restart: always
    command: rq worker -u redis://redis:6379/0 high default low
    env_file:
      - ../.env
    depends_on:
      - redis
      - postgres
      - qdrant
      - embedding-service
    volumes:
      - ../data/test_docs:/app/data

  frontend:
    build:
      context: ../apps/frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      - backend
    # Note: No volumes for frontend in prod (uses the built image)
    command: npm run start

  prometheus:
    image: prom/prometheus
    restart: always

  grafana:
    image: grafana/grafana
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - ../.env
    depends_on:
      - prometheus